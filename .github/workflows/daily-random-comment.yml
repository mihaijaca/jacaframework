name: Update main.py

on:
  schedule:
    - cron: "17 3 * * *"   # Daily at 03:17 UTC
  workflow_dispatch:

jobs:
  update-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate random comment
        id: rand
        run: |
          RAND=$(date +%s%N | sha256sum | head -c 12)
          echo "comment=# AUTO_COMMENT_$RAND" >> $GITHUB_OUTPUT

      - name: Insert comment at top of main.py
        run: |
          COMMENT="${{ steps.rand.outputs.comment }}"
          echo "$COMMENT" | cat - main.py > temp && mv temp main.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add main.py
          git commit -m "Daily random comment added" || echo "No changes to commit"

      - name: Push changes
        run: |
          git push || echo "Nothing to push"
