name: frameworksteps	222

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  build:
    env:
      PY_COLORS: "1"

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13"]

    runs-on: ${{ matrix.os }}

    steps:

    # -----------------------------
    # ORDER BLOCK
    # (Each step is independent and safe to shuffle)
    # -----------------------------

    - name: Step A - Checkout repository
      run: echo "Checkout step executed"
    - uses: actions/checkout@v4

    - name: Step B - Install Brave Browser
      run: |
        echo "Installing Brave Browser..."
        sudo apt-get update
        sudo apt install -y apt-transport-https curl
        sudo curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg \
          https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] \
          https://brave-browser-apt-release.s3.brave.com/ stable main" \
          | sudo tee /etc/apt/sources.list.d/brave-browser-release.list
        sudo apt update
        sudo apt install -y brave-browser
        brave-browser --version || true

    - name: Step C - Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Step D - Install WARP
      run: |
        echo "Setting up Cloudflare WARP..."
        sudo apt-get -y update
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
          | sudo gpg --yes --dearmor \
          --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] \
          https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" \
          | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends cloudflare-warp
        sudo warp-cli --accept-tos registration new
        sudo warp-cli --accept-tos mode warp+doh
        sudo warp-cli --accept-tos connect
        sleep 5

    - name: Step E - Verify WARP connection
      run: |
        echo "Checking WARP connection..."
        curl -s https://www.cloudflare.com/cdn-cgi/trace | grep "warp=on" || true

    - name: Step F - Set Locale
      run: |
        sudo apt-get install tzdata locales -y
        sudo locale-gen en_US.UTF-8
        sudo localectl set-locale LANG="en_US.UTF-8"
        export LANG="en_US.UTF-8"
        sudo update-locale

    - name: Step G - Install Python dependencies
      run: |
        python -m pip install --upgrade pip wheel
        pip install seleniumbase pyautogui pymongo python-xlib

    - name: Step H - Install chromedriver
      run: |
        seleniumbase install chromedriver

    # -----------------------------
    # TEST STEPS
    # -----------------------------

    - name: Test 1 - Print environment info
      run: |
        echo "Python version:"
        python --version || true
        echo "Brave version:"
        brave-browser --version || true

    - name: Test 2 - success test
      run: |
        echo "Running harmless test..."
        echo "SUCCESS" > test_output.txt
        cat test_output.txt

    # -----------------------------
    # MAIN SCRIPT EXECUTION
    # -----------------------------

    - name: Run main.py
      run: |
        python main.py --brave --incognito --do-not-track --xvfb --screenshot || true
